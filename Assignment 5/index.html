<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment 5 - JavaScript Interaction</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>JavaScript Concepts Demo</h1>
      <p>Enter two numbers, calculate their sum, update the image source, and fetch API data using JavaScript.</p>
    </header>

    <main>
      <section class="input-section">
        <div class="field-row">
          <label for="number1">Number 1</label>
          <input type="number" id="number1" name="number1" placeholder="Enter first number" />
        </div>
        <div class="field-row">
          <label for="number2">Number 2</label>
          <input type="number" id="number2" name="number2" placeholder="Enter second number" />
        </div>
        <button id="calculateBtn">Calculate</button>
      </section>

      <section class="result-section">
        <h2>Result</h2>
        <div id="resultOutput" class="output-box"></div>
      </section>

      <section class="image-section">
        <h2>Image Preview</h2>
        <div class="image-wrapper">
          <img id="previewImage" src="" alt="Preview image will appear here" />
        </div>
      </section>

      <section class="fetch-section">
        <h2>Fetched Data</h2>
        <div id="fetchOutput" class="output-box"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
